name: Build & Release desktop apps

# Builds the ForgeLink Builder and Launcher into Windows installers and attaches
# them to a GitHub Release. Triggered when you push a version tag like v1.0.0.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The resulting installers appear at:
#   https://github.com/AlphaNodesDev/forgelink/releases

on:
  push:
    tags:
      - 'v*'
  # Allows manually running from the Actions tab without a tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build shared + adapters
        run: |
          npm run build:shared
          npm run build:adapters

      # electron-builder bundles 7zip-bin, but in an npm-workspaces layout the
      # 7za.exe binary can be missing/unextracted, causing a chmod ENOENT.
      # The GitHub Windows runner already ships 7-Zip, so point electron-builder
      # at the system 7za and repair the bundled path as a belt-and-braces step.
      - name: Provision system 7-Zip for electron-builder
        shell: pwsh
        run: |
          $sys7z = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $sys7z)) { choco install 7zip -y --no-progress }
          $binDir = "node_modules\7zip-bin\win\x64"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          # Provide a 7za.exe where electron-builder expects it.
          Copy-Item "C:\Program Files\7-Zip\7za.exe" "$binDir\7za.exe" -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path "$binDir\7za.exe")) {
            Copy-Item $sys7z "$binDir\7za.exe" -Force
          }
          Get-ChildItem $binDir

      - name: Package Builder (Windows installer)
        run: npm run package --workspace=@forgelink/builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_SYSTEM_7ZA: 'true'

      - name: Package Launcher (Windows installer)
        run: npm run package --workspace=@forgelink/launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_SYSTEM_7ZA: 'true'

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist-release
          find packages/builder/release packages/launcher/release -type f \
            \( -name '*.exe' -o -name '*.blockmap' -o -name '*.yml' \) \
            -exec cp {} dist-release/ \; || true
          ls -la dist-release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forgelink-windows-installers
          path: dist-release/*

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
